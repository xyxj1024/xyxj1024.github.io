# Build settings
markdown:             kramdown
kramdown:
  input:              GFM
  hard_wrap:          false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
          # Use existing pygments syntax highlighting css
          css_class:  'highlight'
  footnote_backlink:  "⤴"
highlighter:          pygments
excerpt_separator:    <!-- excerpt-end -->
mathjax:              true

# Permalinks
permalink:        pretty

# Setup
title:            Xingjian
# tagline:        'Personal Website'
description-1:    '譬大道之在天下猶川谷之於江海'
description-2:    'Eventually, all things merge into one, and a river runs through it.'
baseurl:          https://xingjianxuanyuan.github.io/

include: ["_pages", "_posts"]

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-target-blank

author:
  name:           'Xingjian Xuanyuan'
  url:            https://github.com/XingjianXuanyuan

paginate:         5

# Custom vars
version:          1.0

github:
  repo:           https://github.com/XingjianXuanyuan/XingjianXuanyuan.github.io